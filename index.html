<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #1e2f8e;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: #333;
      cursor: pointer;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: #1565c0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      padding: 6px 11px;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.2s;
      user-select: none;
    }

    .nav-link:hover { color: #1565c0; }
    .nav-link.active { color: #1565c0; font-weight: 600; }
    .nav-link.earn { color: #1565c0; }

    /* ── Language toggle ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 8px;
    }

    .lang-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: #1565c0;
      color: white;
    }

    .lang-btn:not(.active):hover { background: #f0f0f0; }

    .btn-login {
      padding: 6px 12px;
      background: transparent;
      border: none;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }

    .btn-signup {
      padding: 7px 16px;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-signup:hover { background: #0d47a1; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Home Page ── */
    .home-wrap {
      max-width: 460px;
      margin: 36px auto;
      padding: 0 16px 40px;
    }

    .hero {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .hero-icon { font-size: 52px; margin-bottom: 6px; }
    .hero h1 { font-size: 22px; font-weight: 700; }

    .main-card {
      background: white;
      border-radius: 10px;
      padding: 24px 22px;
    }

    .main-card h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a237e;
      margin-bottom: 3px;
    }

    .card-subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
    }

    .main-card p {
      font-size: 13px;
      color: #444;
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .service-list { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }

    .service-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #dde3f5;
      border-radius: 7px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.18s;
    }

    .service-item:hover { background: #c5cde8; }

    .service-left { display: flex; align-items: center; gap: 14px; }

    .service-emoji { font-size: 26px; }

    .service-info h3 {
      font-size: 14px;
      font-weight: 600;
      color: #1a237e;
      margin-bottom: 2px;
    }

    .service-info p {
      font-size: 12px;
      color: #555;
      margin: 0;
    }

    .arrow { color: #888; font-size: 18px; font-weight: 300; }

    .share-btn {
      display: block;
      margin: 22px auto 0;
      padding: 10px 36px;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .share-btn:hover { background: #0d47a1; }

    .contact-section {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid #e8e8e8;
    }

    .contact-section h3 {
      font-size: 15px;
      font-weight: 700;
      color: #1a237e;
      margin-bottom: 8px;
    }

    .contact-section p {
      font-size: 13px;
      color: #555;
      margin-bottom: 2px;
    }

    .social-icons { display: flex; gap: 8px; margin-top: 12px; }

    .s-icon {
      width: 30px;
      height: 30px;
      background: #1565c0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Sub-pages ── */
    .sub-wrap {
      max-width: 460px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .sub-card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sub-item {
      background: #d0d8f0;
      border-radius: 5px;
      padding: 13px 16px;
      font-size: 14px;
      color: #1a237e;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.18s;
    }

    .sub-item:hover { background: #b3c0e8; }

    /* ── Modals ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }

    .overlay.active { display: block; }

    .modal {
      position: absolute;
      top: 56px;
      right: 14px;
      background: white;
      border-radius: 10px;
      padding: 22px 20px;
      width: 310px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.22);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .social-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 7px 4px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 10px;
      color: #555;
      transition: background 0.15s;
    }

    .social-pill:hover { background: #f4f4f4; }
    .social-pill .si { font-size: 17px; }

    .divider {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin: 12px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ddd;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #1565c0; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #1565c0;
      cursor: pointer;
      margin-top: -6px;
      margin-bottom: 14px;
    }

    .btn-full {
      width: 100%;
      padding: 10px;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-full:hover { background: #0d47a1; }

    .modal-foot {
      text-align: center;
      margin-top: 13px;
      font-size: 13px;
      color: #555;
    }

    .modal-foot a { color: #1565c0; cursor: pointer; text-decoration: none; }

    .su-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 9px;
    }

    .su-google    { background: white; border: 1px solid #ddd !important; color: #333; }
    .su-microsoft { background: #2b2b2b; color: white; }
    .su-email     { background: #e05c28; color: white; }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="navbar-brand" onclick="showPage('home')">
    <div class="logo-icon">🔧</div>
    Service Hub
  </div>
  <div class="navbar-nav">
    <span class="nav-link active" id="nav-home"        onclick="showPage('home')"        data-i18n="nav_home"></span>
    <span class="nav-link"        id="nav-auto"        onclick="showPage('auto')"        data-i18n="nav_auto"></span>
    <span class="nav-link"        id="nav-maintenance" onclick="showPage('maintenance')" data-i18n="nav_maintenance"></span>
    <span class="nav-link"        id="nav-pets"        onclick="showPage('pets')"        data-i18n="nav_pets"></span>
    <span class="nav-link earn"   id="nav-earn"        onclick="showPage('earn')"        data-i18n="nav_earn"></span>

    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <button class="btn-login"  onclick="openModal('login')"  data-i18n="nav_login"></button>
    <button class="btn-signup" onclick="openModal('signup')" data-i18n="nav_signup"></button>
  </div>
</nav>

<!-- ── Page : Accueil / Home ── -->
<div id="page-home" class="page active">
  <div class="home-wrap">
    <div class="hero">
      <div class="hero-icon">🔧</div>
      <h1>Service Hub</h1>
    </div>

    <div class="main-card">
      <h2 data-i18n="home_title"></h2>
      <p class="card-subtitle" data-i18n="home_subtitle"></p>
      <p data-i18n="home_p1"></p>
      <p data-i18n="home_p2"></p>

      <div class="service-list">
        <div class="service-item" onclick="showPage('auto')">
          <div class="service-left">
            <span class="service-emoji">🚗</span>
            <div class="service-info">
              <h3 data-i18n="svc_auto_title"></h3>
              <p  data-i18n="svc_auto_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('maintenance')">
          <div class="service-left">
            <span class="service-emoji">🏠</span>
            <div class="service-info">
              <h3 data-i18n="svc_maint_title"></h3>
              <p  data-i18n="svc_maint_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('pets')">
          <div class="service-left">
            <span class="service-emoji">🐾</span>
            <div class="service-info">
              <h3 data-i18n="svc_pets_title"></h3>
              <p  data-i18n="svc_pets_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('earn')">
          <div class="service-left">
            <span class="service-emoji">💰</span>
            <div class="service-info">
              <h3 data-i18n="svc_earn_title"></h3>
              <p  data-i18n="svc_earn_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>
      </div>

      <button class="share-btn" data-i18n="share_btn"></button>

      <div class="contact-section">
        <h3 data-i18n="contact_title"></h3>
        <p  data-i18n="contact_business"></p>
        <p  data-i18n="contact_email"></p>
        <p  data-i18n="contact_location"></p>
        <div class="social-icons">
          <div class="s-icon" title="YouTube">▶</div>
          <div class="s-icon" title="Twitter">𝕏</div>
          <div class="s-icon" title="LinkedIn">in</div>
          <div class="s-icon" title="Facebook">f</div>
          <div class="s-icon" title="Instagram">📷</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Page : Auto ── -->
<div id="page-auto" class="page">
  <div class="sub-wrap">
    <div class="sub-card">
      <div class="sub-item" data-i18n="auto_1"></div>
      <div class="sub-item" data-i18n="auto_2"></div>
      <div class="sub-item" data-i18n="auto_3"></div>
    </div>
  </div>
</div>

<!-- ── Page : Maintenance ── -->
<div id="page-maintenance" class="page">
  <div class="sub-wrap">
    <div class="sub-card">
      <div class="sub-item" data-i18n="maint_1"></div>
      <div class="sub-item" data-i18n="maint_2"></div>
      <div class="sub-item" data-i18n="maint_3"></div>
      <div class="sub-item" data-i18n="maint_4"></div>
    </div>
  </div>
</div>

<!-- ── Page : Animaux / Pets ── -->
<div id="page-pets" class="page">
  <div class="sub-wrap">
    <div class="sub-card">
      <div class="sub-item" data-i18n="pets_1"></div>
    </div>
  </div>
</div>

<!-- ── Page : Gagner / Earn ── -->
<div id="page-earn" class="page">
  <div class="sub-wrap">
    <div class="sub-card">
      <div class="sub-item" data-i18n="earn_1"></div>
    </div>
  </div>
</div>

<!-- ── Modal : Connexion / Login ── -->
<div id="overlay-login" class="overlay" onclick="bgClose(event,'login')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="social-grid">
      <button class="social-pill"><span class="si">G</span>Google</button>
      <button class="social-pill"><span class="si">⊞</span>Microsoft</button>
      <button class="social-pill"><span class="si">f</span>Facebook</button>
      <button class="social-pill"><span class="si"></span>Apple</button>
      <button class="social-pill"><span class="si">☁</span>Salesforce</button>
    </div>

    <div class="divider" data-i18n="or"></div>

    <div class="field">
      <label data-i18n="login_email_label"></label>
      <input type="text" autocomplete="username">
    </div>
    <div class="field">
      <label data-i18n="login_pw_label"></label>
      <input type="password" autocomplete="current-password">
    </div>

    <a class="forgot" data-i18n="login_forgot"></a>

    <button class="btn-full" data-i18n="login_btn"></button>

    <div class="modal-foot">
      <span data-i18n="login_no_account"></span>
      <a onclick="switchModal('login','signup')" data-i18n="nav_signup"></a>
    </div>
  </div>
</div>

<!-- ── Modal : S'inscrire / Sign Up ── -->
<div id="overlay-signup" class="overlay" onclick="bgClose(event,'signup')">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="su-btn su-google">
      <span>G</span> <span data-i18n="signup_google"></span>
    </button>
    <button class="su-btn su-microsoft">
      <span>⊞</span> <span data-i18n="signup_microsoft"></span>
    </button>

    <div class="divider" data-i18n="or"></div>

    <button class="su-btn su-email">
      <span>✉</span> <span data-i18n="signup_email"></span>
    </button>

    <div class="modal-foot" style="margin-top:16px">
      <span data-i18n="signup_have_account"></span>
      <a onclick="switchModal('signup','login')" data-i18n="login_btn"></a>
    </div>
  </div>
</div>

<script>
  /* ── Translations ── */
  const translations = {
    fr: {
      nav_home:        'Accueil',
      nav_auto:        'Auto',
      nav_maintenance: 'Entretien',
      nav_pets:        'Animaux',
      nav_earn:        'Gagner',
      nav_login:       'Connexion',
      nav_signup:      "S'inscrire",

      home_title:    'Bienvenue sur Service Hub',
      home_subtitle: 'Accédez à plusieurs services et gérez tout en un seul endroit.',
      home_p1:       "Service Hub est une application polyvalente qui propose plusieurs services à la demande, chacun accessible via des onglets séparés pour une navigation facile. Les utilisateurs peuvent sélectionner le service souhaité et soumettre leurs demandes facilement via un formulaire dédié.",
      home_p2:       "En plus de servir les utilisateurs, Service Hub accueille de nouveaux prestataires souhaitant rejoindre la plateforme. Les prestataires intéressés peuvent postuler via un formulaire d'inscription dédié, élargissant ainsi la gamme de services disponibles.",

      svc_auto_title:  'Services Automobiles',
      svc_auto_desc:   'Sélectionnez le service souhaité et fournissez les détails du véhicule pour une aide rapide.',
      svc_maint_title: 'Rénovation et Entretien de Maison',
      svc_maint_desc:  'Améliorez votre maison.',
      svc_pets_title:  'Services pour Animaux',
      svc_pets_desc:   'Soumettez une demande pour notre service de soins aux animaux.',
      svc_earn_title:  'Gagnez Avec Nous',
      svc_earn_desc:   'Rejoignez notre équipe en tant que Prestataire de Services.',

      share_btn:        'Partager Cette Application',
      contact_title:    'Contactez-Nous',
      contact_business: "Nom de l'entreprise",
      contact_email:    'Email',
      contact_location: 'Emplacement',

      auto_1: 'Assistance Routière 🚗',
      auto_2: 'Mécanicien Mobile',
      auto_3: 'Nettoyage Auto Mobile',

      maint_1: 'Plomberie',
      maint_2: 'Électricité',
      maint_3: 'Peinture et Décoration',
      maint_4: 'Jardinage',

      pets_1: 'Services Animaliers 🐾',
      earn_1: 'Formulaire pour Prestataires de Services',

      or:                  'OU',
      login_email_label:   "Adresse email ou nom d'utilisateur",
      login_pw_label:      'Mot de passe',
      login_forgot:        'Mot de passe oublié ?',
      login_btn:           'Se connecter',
      login_no_account:    'Pas de compte ? ',

      signup_google:       "S'inscrire avec Google",
      signup_microsoft:    "S'inscrire avec Microsoft",
      signup_email:        "S'inscrire avec Email",
      signup_have_account: 'Déjà un compte ? ',
    },
    en: {
      nav_home:        'Home',
      nav_auto:        'Auto',
      nav_maintenance: 'Maintenance',
      nav_pets:        'Pets',
      nav_earn:        'Earn',
      nav_login:       'Login',
      nav_signup:      'Sign Up',

      home_title:    'Welcome to Service Hub',
      home_subtitle: 'Access multiple services and manage everything in one place.',
      home_p1:       'Service Hub is a versatile app that provides multiple on-demand services, each accessible through separate tabs for easy navigation. Users can select the specific service they require and submit their requests conveniently via a dedicated form.',
      home_p2:       'In addition to serving users, Service Hub welcomes new providers who wish to join the platform. Interested providers can apply through a dedicated signup tab, expanding the range of services available to users.',

      svc_auto_title:  'Automotive Services',
      svc_auto_desc:   'Select your needed service and provide vehicle details to get quick help.',
      svc_maint_title: 'Home Improvement and Maintenance',
      svc_maint_desc:  'Make house better.',
      svc_pets_title:  'Pet and Animal Services',
      svc_pets_desc:   'Submit a request for our Pet care service.',
      svc_earn_title:  'Earn With Us',
      svc_earn_desc:   'Join our team as a Service Provider.',

      share_btn:        'Share This App',
      contact_title:    'Contact Us',
      contact_business: 'Business Name',
      contact_email:    'Email',
      contact_location: 'Location',

      auto_1: 'Roadside Assistance 🚗',
      auto_2: 'Mobile Mechanic',
      auto_3: 'Mobile Auto Detailing',

      maint_1: 'Plumbing',
      maint_2: 'Electrical',
      maint_3: 'Painting & Decoration',
      maint_4: 'Gardening',

      pets_1: 'Pet Services 🐾',
      earn_1: 'Contractor / Service Provider Intake',

      or:                  'OR',
      login_email_label:   'Email address or username',
      login_pw_label:      'Password',
      login_forgot:        'Forgot password?',
      login_btn:           'Log in',
      login_no_account:    "Don't have an account? ",

      signup_google:       'Sign up with Google',
      signup_microsoft:    'Sign up with Microsoft',
      signup_email:        'Sign up with Email',
      signup_have_account: 'Already have an account? ',
    }
  };

  let currentLang = 'fr';

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    const t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
  }

  /* ── Page routing ── */
  const pages  = ['home','auto','maintenance','pets','earn'];

  function showPage(name) {
    pages.forEach(p => {
      document.getElementById('page-' + p).classList.toggle('active', p === name);
    });
    pages.forEach(p => {
      const el = document.getElementById('nav-' + p);
      if (el) el.classList.toggle('active', p === name);
    });
  }

  /* ── Modals ── */
  function openModal(type) {
    document.getElementById('overlay-' + type).classList.add('active');
  }

  function bgClose(e, type) {
    if (e.target === document.getElementById('overlay-' + type))
      document.getElementById('overlay-' + type).classList.remove('active');
  }

  function switchModal(from, to) {
    document.getElementById('overlay-' + from).classList.remove('active');
    document.getElementById('overlay-' + to).classList.add('active');
  }

  /* ── Init ── */
  setLang('fr');
</script>
</body>
</html>
