<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #1e3a8a;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      box-shadow: 0 1px 0 #e5e7eb;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 15px;
      color: #111;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-box {
      width: 30px;
      height: 30px;
      background: #1565c0;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .navbar-nav {
      display: flex;
      align-items: center;
    }

    .nav-link {
      padding: 0 12px;
      height: 52px;
      display: flex;
      align-items: center;
      color: #555;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
      user-select: none;
      text-decoration: none;
    }

    .nav-link:hover            { color: #1565c0; }
    .nav-link.active           { color: #1565c0; border-bottom-color: #1565c0; }

    /* Language toggle */
    .lang-toggle {
      display: flex;
      align-items: center;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 10px;
    }

    .lang-btn {
      padding: 3px 11px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .lang-btn.active              { background: #1565c0; color: #fff; }
    .lang-btn:not(.active):hover  { background: #f3f4f6; }

    .btn-login {
      padding: 0 14px;
      height: 52px;
      background: transparent;
      border: none;
      color: #555;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    .btn-signup {
      padding: 7px 18px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-left: 4px;
    }

    .btn-signup:hover { background: #1251a3; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Home ── */
    .home-wrap {
      max-width: 430px;
      margin: 28px auto 50px;
      padding: 0 16px;
    }

    .hero {
      text-align: center;
      color: #fff;
      margin-bottom: 16px;
    }

    .hero-fig { margin-bottom: 4px; }

    .hero h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    /* Main white card */
    .main-card {
      background: #fff;
      border-radius: 10px;
      padding: 22px 20px 20px;
    }

    .main-card h2 {
      font-size: 17px;
      font-weight: 800;
      color: #1a237e;
      margin-bottom: 2px;
    }

    .card-sub {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .main-card > p {
      font-size: 13px;
      color: #374151;
      line-height: 1.65;
      margin-bottom: 10px;
      font-weight: 400;
    }

    /* ── Service items (home) ── */
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 16px;
    }

    .service-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #e8eaf6;
      border-radius: 8px;
      padding: 12px 14px 12px 12px;
      cursor: pointer;
      gap: 12px;
      transition: background .15s;
    }

    .service-item:hover { background: #c5cae9; }

    .service-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .svc-icon-box {
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .svc-text { min-width: 0; }

    .svc-text h3 {
      font-size: 13.5px;
      font-weight: 700;
      color: #1a237e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .svc-text p {
      font-size: 11.5px;
      color: #6b7280;
      font-weight: 400;
      margin-top: 1px;
    }

    .arrow {
      color: #9ca3af;
      font-size: 20px;
      font-weight: 300;
      flex-shrink: 0;
      line-height: 1;
    }

    /* Share button */
    .share-btn {
      display: block;
      margin: 18px auto 0;
      padding: 9px 36px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      letter-spacing: .3px;
    }

    .share-btn:hover { background: #14197a; }

    /* Contact */
    .contact-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
    }

    .contact-section h3 {
      font-size: 15px;
      font-weight: 800;
      color: #1a237e;
      margin-bottom: 6px;
    }

    .contact-section p {
      font-size: 12.5px;
      color: #6b7280;
      font-weight: 400;
      line-height: 1.6;
    }

    .social-row {
      display: flex;
      gap: 7px;
      margin-top: 10px;
    }

    .s-circle {
      width: 28px;
      height: 28px;
      background: #1565c0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── Sub-pages ── */
    .sub-wrap {
      max-width: 430px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .sub-card {
      background: #fff;
      border-radius: 10px;
      padding: 6px;
    }

    .sub-item {
      background: #e8eaf6;
      border-radius: 6px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #1a237e;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 3px;
    }

    .sub-item:last-child { margin-bottom: 0; }
    .sub-item:hover { background: #c5cae9; }

    /* ── Contractor Form ── */
    .form-wrap {
      max-width: 560px;
      margin: 26px auto 50px;
      padding: 0 16px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: rgba(255,255,255,.85);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-bottom: 12px;
      padding: 0;
    }

    .back-btn:hover { color: #fff; }

    .form-card {
      background: #fff;
      border-radius: 10px;
      padding: 28px 24px;
    }

    .form-card h2 {
      font-size: 18px;
      font-weight: 800;
      color: #1a237e;
      margin-bottom: 6px;
    }

    .form-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 5px;
    }

    .req { color: #ef4444; margin-left: 2px; }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      color: #111827;
      outline: none;
      background: #fff;
      transition: border-color .15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #1565c0; }

    .form-group textarea { min-height: 80px; resize: vertical; }

    .form-hint      { font-size: 11.5px; color: #ef4444; margin-top: 3px; }
    .form-hint.info { color: #9ca3af; }

    .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .three-col { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 8px; }

    .check-group { display: flex; flex-direction: column; gap: 9px; margin-top: 5px; }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
    }

    .check-row input { width: auto; padding: 0; border: none; accent-color: #1565c0; cursor: pointer; }

    .form-actions { display: flex; gap: 10px; margin-top: 26px; }

    .btn-save {
      padding: 10px 24px;
      background: #fff;
      border: 2px solid #1565c0;
      color: #1565c0;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    .btn-save:hover { background: #eff6ff; }

    .btn-submit {
      flex: 1;
      padding: 10px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    .btn-submit:hover { background: #1251a3; }

    /* ── Modals ── */
    .overlay { display: none; position: fixed; inset: 0; z-index: 200; }
    .overlay.active { display: block; }

    .modal {
      position: absolute;
      top: 52px;
      right: 14px;
      background: #fff;
      border-radius: 10px;
      padding: 20px 18px;
      width: 320px;
      box-shadow: 0 8px 30px rgba(0,0,0,.2);
    }

    /* Social grid – login */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .social-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 2px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      font-family: 'Nunito', sans-serif;
      transition: background .15s;
    }

    .social-pill:hover { background: #f9fafb; }

    .divider {
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 700;
      margin: 12px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: #1565c0; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      margin-top: -5px;
      margin-bottom: 14px;
    }

    .btn-full {
      width: 100%;
      padding: 11px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }

    .btn-full:hover { background: #1251a3; }

    .modal-foot {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
    }

    .modal-foot a { color: #1565c0; cursor: pointer; text-decoration: none; font-weight: 700; }

    /* Sign-up buttons */
    .su-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .su-google    { background: #fff; border: 1.5px solid #e5e7eb; color: #111; }
    .su-microsoft { background: #1f1f1f; color: #fff; }
    .su-email     { background: #e05c28; color: #fff; }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="navbar-brand" onclick="showPage('home')">
    <div class="logo-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    Service Hub
  </div>

  <div class="navbar-nav">
    <span class="nav-link active" id="nav-home"        onclick="showPage('home')"        data-i18n="nav_home"></span>
    <span class="nav-link"        id="nav-auto"        onclick="showPage('auto')"        data-i18n="nav_auto"></span>
    <span class="nav-link"        id="nav-maintenance" onclick="showPage('maintenance')" data-i18n="nav_maintenance"></span>
    <span class="nav-link"        id="nav-pets"        onclick="showPage('pets')"        data-i18n="nav_pets"></span>
    <span class="nav-link"        id="nav-earn"        onclick="showPage('earn')"        data-i18n="nav_earn"></span>

    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>

    <button class="btn-login"  onclick="openModal('login')"  data-i18n="nav_login"></button>
    <button class="btn-signup" onclick="openModal('signup')" data-i18n="nav_signup"></button>
  </div>
</nav>

<!-- ══════════ HOME ══════════ -->
<div id="page-home" class="page active">
  <div class="home-wrap">

    <div class="hero">
      <div class="hero-fig">
        <!-- Jotform-style service worker illustration -->
        <svg width="70" height="78" viewBox="0 0 70 78" xmlns="http://www.w3.org/2000/svg">
          <!-- hard hat -->
          <ellipse cx="35" cy="24" rx="21" ry="7" fill="#FFA726"/>
          <rect x="14" y="20" width="42" height="8" rx="3" fill="#FB8C00"/>
          <!-- brim shadow line -->
          <rect x="12" y="26" width="46" height="2" rx="1" fill="#F57C00" opacity=".5"/>
          <!-- head -->
          <circle cx="35" cy="40" r="14" fill="#fff" opacity=".96"/>
          <!-- eyes -->
          <circle cx="29.5" cy="38.5" r="2" fill="#1a237e"/>
          <circle cx="40.5" cy="38.5" r="2" fill="#1a237e"/>
          <!-- smile -->
          <path d="M29 44 Q35 49 41 44" stroke="#1a237e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <!-- body / uniform -->
          <path d="M13 78 Q13 57 35 57 Q57 57 57 78 Z" fill="#1565c0"/>
          <!-- collar -->
          <path d="M28 57 L35 64 L42 57" fill="#fff" opacity=".55"/>
          <!-- wrench (right) -->
          <g transform="translate(50,50) rotate(-25)">
            <rect x="-2.5" y="-2" width="5" height="16" rx="2" fill="#fff" opacity=".8"/>
            <rect x="-5.5" y="-2" width="11" height="5.5" rx="2" fill="#fff" opacity=".8"/>
          </g>
        </svg>
      </div>
      <h1>Service Hub</h1>
    </div>

    <div class="main-card">
      <h2 data-i18n="home_title"></h2>
      <p class="card-sub" data-i18n="home_subtitle"></p>
      <p data-i18n="home_p1"></p>
      <p data-i18n="home_p2"></p>

      <div class="service-list">

        <div class="service-item" onclick="showPage('auto')">
          <div class="service-left">
            <div class="svc-icon-box">🚗</div>
            <div class="svc-text">
              <h3 data-i18n="svc_auto_title"></h3>
              <p  data-i18n="svc_auto_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('maintenance')">
          <div class="service-left">
            <div class="svc-icon-box">🏠</div>
            <div class="svc-text">
              <h3 data-i18n="svc_maint_title"></h3>
              <p  data-i18n="svc_maint_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('pets')">
          <div class="service-left">
            <div class="svc-icon-box">🐾</div>
            <div class="svc-text">
              <h3 data-i18n="svc_pets_title"></h3>
              <p  data-i18n="svc_pets_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="service-item" onclick="showPage('earn')">
          <div class="service-left">
            <div class="svc-icon-box">💼</div>
            <div class="svc-text">
              <h3 data-i18n="svc_earn_title"></h3>
              <p  data-i18n="svc_earn_desc"></p>
            </div>
          </div>
          <span class="arrow">›</span>
        </div>

      </div><!-- /service-list -->

      <button class="share-btn" data-i18n="share_btn"></button>

      <div class="contact-section">
        <h3 data-i18n="contact_title"></h3>
        <p data-i18n="contact_business"></p>
        <p data-i18n="contact_email_lbl"></p>
        <p data-i18n="contact_location"></p>
        <div class="social-row">
          <div class="s-circle" title="YouTube">▶</div>
          <div class="s-circle" title="Twitter">𝕏</div>
          <div class="s-circle" title="LinkedIn" style="font-size:9px">in</div>
          <div class="s-circle" title="Facebook">f</div>
          <div class="s-circle" title="Instagram">◎</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ EARN ══════════ -->
<div id="page-earn" class="page">
  <div class="sub-wrap">
    <div class="sub-card">
      <div class="sub-item" onclick="showPage('contractor-form')" data-i18n="earn_1"></div>
    </div>
  </div>
</div>

<!-- ══════════ CONTRACTOR FORM ══════════ -->
<div id="page-contractor-form" class="page">
  <div class="form-wrap">
    <button class="back-btn" onclick="showPage('earn')">
      ← <span data-i18n="form_back"></span>
    </button>
    <div class="form-card">
      <h2 data-i18n="earn_1"></h2>
      <p class="form-desc" data-i18n="form_desc"></p>

      <div class="form-group">
        <label><span data-i18n="form_business"></span><span class="req">*</span></label>
        <input type="text" id="f-business">
      </div>

      <div class="form-group">
        <label><span data-i18n="form_contact"></span><span class="req">*</span></label>
        <div class="two-col">
          <input type="text" id="f-first" data-i18n-ph="form_first">
          <input type="text" id="f-last"  data-i18n-ph="form_last">

let lang = 'fr';

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-fr').classList.toggle('active', l === 'fr');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  const t = T[l];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (t[el.dataset.i18n] !== undefined) el.textContent = t[el.dataset.i18n];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    if (t[el.dataset.i18nPh] !== undefined) el.placeholder = t[el.dataset.i18nPh];
  });
}

const ALL = ['home','auto','maintenance','pets','earn','contractor-form'];

function showPage(name) {
  ALL.forEach(p => document.getElementById('page-' + p).classList.toggle('active', p === name));
  ['home','auto','maintenance','pets','earn'].forEach(p => {
    const el = document.getElementById('nav-' + p);
    if (el) el.classList.toggle('active', p === name || (name === 'contractor-form' && p === 'earn'));
  });
}

function openModal(type)  { document.getElementById('overlay-' + type).classList.add('active'); }
function bgClose(e, type) { if (e.target === document.getElementById('overlay-' + type)) document.getElementById('overlay-' + type).classList.remove('active'); }
function switchModal(a,b) { document.getElementById('overlay-' + a).classList.remove('active'); document.getElementById('overlay-' + b).classList.add('active'); }
